name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (stdlib core + mcp for server import)
        run: pip install mcp -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q
